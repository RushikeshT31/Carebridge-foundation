<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
    135deg,
    #14b8a6,
    #0f766e
);
}

.login-container{
    width:520px;
    background:rgba(255,255,255,0.95);
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    font-size:50px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:#0f172a;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
    font-size:14px;
}

.register-btn{
    display:block;
    width:100%;
    text-align:center;
    margin-top:12px;
    padding:14px;
    background:#f59e0b;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

select{
    width:100%;
    padding:16px 18px;
    margin-bottom:20px;
    border:1px solid #d1d5db;
    border-radius:12px;
    font-size:18px;
    background:#ffffff;
    color:#555;
    outline:none;
    transition:0.3s;
    cursor:pointer;
}

select:focus{
    border-color:#2563eb;
    box-shadow:0 0 10px rgba(37,99,235,0.2);
}

select option{
    background:white;
    color:#333;
}

</style>
</head>

<body>

<div class="login-container">

<div class="logo">🤝</div>

<h1>Volunteer Registration</h1>

<p class="subtitle">
Join CareBridge Foundation and Make a Difference
</p>

<form action="/register" method="POST">

    <input type="text" name="username" placeholder="👤 Username" required>

    <input type="email" name="email" placeholder="📧 Email Address" required>

    <input type="tel" name="phone" placeholder="📱 Phone Number" required>

    <input type="text" name="city" placeholder="🏙️ City" required>

    <input type="password" name="password" placeholder="🔒 Password" required>

    <select name="interest" required>
        <option value="">🌟 Select Area of Interest</option>
        <option>📚 Education</option>
        <option>🏥 Healthcare</option>
        <option>🍲 Food Distribution</option>
        <option>👩 Women Empowerment</option>
        <option>🌱 Environment</option>
 <option>🩸 Blood Donation Camps</option>
    <option>🚑 Disaster Relief</option>
    <option>♿ Disability Support</option>
    <option>🍎 Nutrition Awareness</option>
    <option>🧹 Cleanliness Drives</option>
    <option>Other</option>

    </select>

    <button type="submit">
        Register
    </button>

</form>
</body>
</html>
